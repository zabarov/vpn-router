services:
  vpn-router-egress:
    image: tailscale/tailscale:stable
    container_name: ${VPN_ROUTER_EGRESS_SERVICE_NAME:-vpn-router-egress}
    hostname: ${VPN_ROUTER_EGRESS_SERVICE_NAME:-vpn-router-egress}
    restart: unless-stopped
    environment:
      TS_AUTHKEY: ${VPN_ROUTER_TAILSCALE_AUTH_KEY:?Set VPN_ROUTER_TAILSCALE_AUTH_KEY}
      TS_EXTRA_ARGS: --exit-node=${VPN_ROUTER_TAILSCALE_EXIT_NODE:?Set VPN_ROUTER_TAILSCALE_EXIT_NODE}
      TS_STATE_DIR: /var/lib/tailscale
      TS_USERSPACE: "true"
      TS_SOCKS5_SERVER: 0.0.0.0:1055
    volumes:
      - ${VPN_ROUTER_EGRESS_STATE_DIRECTORY:-/var/lib/vpn-router/egress-tailscale}:/var/lib/tailscale
    networks:
      - egress_network

  vpn-router-dns:
    build:
      context: ./dnsmasq
    image: vpn-router-dns:0.1
    container_name: ${VPN_ROUTER_DNS_SERVICE_NAME:-vpn-router-dns}
    network_mode: "container:${VPN_ROUTER_SOURCE_CONTAINER:?Set VPN_ROUTER_SOURCE_CONTAINER}"
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    volumes:
      - ${VPN_ROUTER_DNSMASQ_CONFIG:?Set VPN_ROUTER_DNSMASQ_CONFIG}:/etc/dnsmasq.conf:ro

  vpn-router:
    image: ghcr.io/sagernet/sing-box:v1.13.12
    container_name: ${VPN_ROUTER_SERVICE_NAME:-vpn-router}
    network_mode: "container:${VPN_ROUTER_SOURCE_CONTAINER:?Set VPN_ROUTER_SOURCE_CONTAINER}"
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - ${VPN_ROUTER_SING_BOX_CONFIG:?Set VPN_ROUTER_SING_BOX_CONFIG}:/etc/sing-box/config.json:ro
      - ${VPN_ROUTER_STATE_DIRECTORY:-/var/lib/vpn-router/tailscale}:/var/lib/vpn-router/tailscale
    command: ["-C", "/etc/sing-box", "run"]

networks:
  egress_network:
    external: true
    name: ${VPN_ROUTER_EGRESS_NETWORK:?Set VPN_ROUTER_EGRESS_NETWORK to the Amnezia container network}
